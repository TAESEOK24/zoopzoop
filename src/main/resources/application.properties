spring.application.name=zoopzoop
server.port=8080
spring.datasource.url=jdbc:h2:mem:zoopzoop;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

jwt.secret=zoopzoop-secret-key-should-be-long-enough-2026
jwt.access-token-expiration-seconds=86400
